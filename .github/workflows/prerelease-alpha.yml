# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Pre-release Alpha

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Base semantic version (e.g., 1.0.0, 2.1.0). The pre-release tag and timestamp will be appended automatically.'
        required: true
        default: '1.0.0'
      prerelease_identifier:
        description: 'Pre-release identifier (e.g., alpha, beta, rc)'
        required: true
        default: 'alpha'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: CSharpier verify no changes
        run: dotnet csharpier check .

      - name: Restore dependencies
        run: dotnet restore src/OutbreakTracker2.slnx

      - name: Format style verify no changes
        run: dotnet format style src/OutbreakTracker2.slnx --verify-no-changes

      - name: Format analyzers verify no changes
        run: dotnet format analyzers src/OutbreakTracker2.slnx --verify-no-changes

  build-and-test:
    name: Build and Test (${{ matrix.os }} / ${{ matrix.configuration }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-24.04]
        configuration: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/OutbreakTracker2.slnx

      - name: Build solution
        run: dotnet build src/OutbreakTracker2.slnx -c ${{ matrix.configuration }} --no-restore

      - name: Run unit tests
        run: dotnet test --project src/insights/OutbreakTracker2.UnitTests/OutbreakTracker2.UnitTests.csproj -c ${{ matrix.configuration }}

  prepare:
    name: Prepare Release
    if: github.event_name == 'workflow_dispatch'
    needs: [format, build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      full_version: ${{ steps.generate_version_tag.outputs.FULL_VERSION }}
      tag_name: ${{ steps.generate_version_tag.outputs.TAG_NAME }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Version and Tag Name
        id: generate_version_tag
        run: |
          BASE_VERSION="${{ github.event.inputs.version }}"
          PRERELEASE_ID="${{ github.event.inputs.prerelease_identifier }}"
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          FULL_VERSION="$BASE_VERSION-$PRERELEASE_ID-$TIMESTAMP"
          TAG_NAME="$PRERELEASE_ID-$TIMESTAMP"
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Archive source code (excluding specified folders)
        uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 # 0.7.6
        with:
          type: 'zip'
          filename: 'OutbreakTracker2-${{ steps.generate_version_tag.outputs.FULL_VERSION }}-source.zip'
          path: '${{ github.workspace }}/src'
          exclusions: '*.git* .github/* insights/* .idea/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.generate_version_tag.outputs.TAG_NAME }}
          name: Pre-release (${{ github.event.inputs.prerelease_identifier }}) - ${{ steps.generate_version_tag.outputs.FULL_VERSION }}
          body: |
            Automated Pre-release for OutbreakTracker2.

            **Version:** `${{ steps.generate_version_tag.outputs.FULL_VERSION }}`
            **Base Version:** `${{ github.event.inputs.version }}`
            **Pre-release Identifier:** `${{ github.event.inputs.prerelease_identifier }}`
            **Commit:** `${{ github.sha }}`

            This release includes:
            - Published application for Windows (`win-x64`) and Linux (`linux-x64`)
            - Source code (excluding 'insights' and '.idea' folders from 'src')
          draft: false
          prerelease: true
          files: OutbreakTracker2-${{ steps.generate_version_tag.outputs.FULL_VERSION }}-source.zip

  publish:
    name: Publish (${{ matrix.rid }})
    if: github.event_name == 'workflow_dispatch'
    needs: prepare
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_suffix: windows
          - os: ubuntu-24.04
            rid: linux-x64
            artifact_suffix: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/application/OutbreakTracker2.Application/OutbreakTracker2.Application.csproj --runtime ${{ matrix.rid }}

      - name: Publish application
        run: dotnet publish src/application/OutbreakTracker2.Application/OutbreakTracker2.Application.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true --no-restore --output ${{ github.workspace }}/publish_output

      - name: Archive published output
        uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 # 0.7.6
        with:
          type: 'zip'
          filename: 'OutbreakTracker2-${{ needs.prepare.outputs.full_version }}-${{ matrix.artifact_suffix }}-published.zip'
          path: '${{ github.workspace }}/publish_output'

      - name: Upload artifact to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          files: OutbreakTracker2-${{ needs.prepare.outputs.full_version }}-${{ matrix.artifact_suffix }}-published.zip
